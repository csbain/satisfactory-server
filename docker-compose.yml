services:
  satisfactory-server:
    container_name: 'satisfactory-server'
    hostname: 'satisfactory-server'
    image: 'ghcr.io/csbain/satisfactory-server:latest'
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - '/dev/net/tun:/dev/net/tun'
    ports:
      - '7777:7777/tcp'
      - '7777:7777/udp'
      - '8888:8888/tcp'
      - '2222:2222/tcp'
    volumes:
      # You can map the base configuration directory (simplest setup):
      - './satisfactory-server:/config'
      # Alternatively, map subdirectories individually (useful for splitting large game files from fast-access saves):
      # - './satisfactory-server/gamefiles:/config/gamefiles'
      # - './satisfactory-server/saved:/config/saved'
      # - './satisfactory-server/backups:/config/backups'
      # - './satisfactory-server/ficsit-cli:/config/ficsit-cli'
    environment:
      - MAXPLAYERS=4
      - PGID=1000
      - PUID=1000
      - STEAMBETA=false
      - SFTP_USERNAME=satisfactory
      - SFTP_PASSWORD=satisfactory
      - TS_AUTHKEY=tskey-auth-YOUR-KEY
      - TS_HOSTNAME=satisfactory-server
      - GC_TIME_BETWEEN_PURGING=30
      - GC_NUM_OBJECTS_PER_STEP=2000
      - STEAMCMD_VALIDATE=false
      - TZ=UTC
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G