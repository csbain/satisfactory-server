services:
  satisfactory-server:
    container_name: 'satisfactory-server'
    hostname: 'satisfactory-server'
    image: 'ghcr.io/csbain/satisfactory-server:latest'
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - '/dev/net/tun:/dev/net/tun'
    ports:
      - '7777:7777/tcp'
      - '7777:7777/udp'
      - '8888:8888/tcp'
      - '2222:2222/tcp'
    volumes:
      # For Unraid: Bypasses FUSE overhead by mapping directly to cache disk (highly recommended)
      # e.g., - '/mnt/cache/appdata/satisfactory-server:/config'
      - './satisfactory-server:/config'
    environment:
      - MAXPLAYERS=4
      - PGID=1000
      - PUID=1000
      - STEAMBETA=false
      - SFTP_USERNAME=steam
      - SFTP_PASSWORD=satisfactory-sftp-pass
      - TS_AUTHKEY=tskey-auth-YOUR-KEY
      - TS_HOSTNAME=satisfactory-server
      - GC_TIME_BETWEEN_PURGING=30
      - GC_NUM_OBJECTS_PER_STEP=2000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G